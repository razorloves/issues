name: Label issue

on:
  issues:
    types: [opened, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  label:
    runs-on: ubuntu-24.04

    steps:
    - name: Detect /reopen comment
      id: reopen-check
      if: github.event_name == 'issue_comment'
      uses: actions/github-script@v9
      with:
        script: |
          const issue = context.payload.issue;
          const comment = context.payload.comment;
          const isReopen =
            issue.state === "closed" &&
            comment.user.login === issue.user.login &&
            comment.body.trim() === "/reopen";

          core.setOutput("reopen", isReopen ? "true" : "false");

    - name: Checkout repo
      if: |
        github.event_name == 'issues' ||
        steps.reopen-check.outputs.reopen == 'true'
      uses: actions/checkout@v6

    - name: Parse issue body
      id: issue-parser
      if: |
        github.event_name == 'issues' ||
        steps.reopen-check.outputs.reopen == 'true'
      uses: edumserrano/github-issue-forms-parser@f4e7864950f591c91ddd5215592484a4c789cebd
      continue-on-error: true
      with:
        template-filepath: '.github/ISSUE_TEMPLATE/bugreport.yml'
        issue-form-body: '${{ github.event.issue.body }}'

    - name: Install dependencies
      if: |
        github.event_name == 'issues' ||
        steps.reopen-check.outputs.reopen == 'true'
      run: pip install -r requirements.txt

    - name: Label issue
      if: |
        github.event_name == 'issues' ||
        steps.reopen-check.outputs.reopen == 'true'
      run: ./label.py
      env:
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        ISSUE_BODY: ${{ steps.issue-parser.outputs.parsed-issue }}
        ISSUE_NUMBER: ${{ github.event.issue.number }}
